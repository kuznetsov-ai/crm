# ════════════════════════════════════════════════════════════════════════════
# UI specifics — known patterns in the codebase
# ════════════════════════════════════════════════════════════════════════════
ui_specifics:
  framework: "React 19 + Vite 8 + Tailwind 4 + Zustand"
  selector_patterns:
    modal: ".fixed.inset-0 .rounded-2xl, [role='dialog']"
    nav_links: "aside a, aside nav a"
    hamburger: "button[aria-label='Toggle menu']"
    sync_button: "button:has-text('Синк'), button:has-text('Sync')"
    event_card: "[data-testid^='event-']"
    event_resize_handle: "[data-testid^='resize-']"
    now_indicator: "[data-testid='now-line']"
    risk_badge: "[data-testid='risk-badge']"
    workspace_switcher: "button[aria-label*='workspace' i], button[aria-label*='рабочее' i]"
  gotchas:
    - "BYPASS_AUTH=true is the default in local dev — /login is bypassed."
    - "Admin credentials still exist (admin@idev.team / admin123) for role=admin login tests."
    - "Frontend is built into nginx image; rebuild with `docker compose build nginx` after FE edits."
    - "Uploads (media) are served via nginx-proxied /media/… — ClientDocumentSerializer returns relative URLs."
    - "Calendar hour grid is HOUR_HEIGHT=64 px per hour, 08:00–21:00 visible."
    - "Drag and resize on calendar use pointer events bound in bindEventPointerDrag/Resize — Playwright's mouse.move+mouse.up works but must hit the card body, not the resize strip."
    - "LeadEnrich modal max-w-[min(1200px,95vw)] — width assertion must use bounding box, not CSS class."
    - "Sync runs in a daemon thread; poll `/api/clients/<id>/` every 2s for status change."
