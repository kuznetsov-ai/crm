      actions:
        - "Capture bounding box of the first event card"
        - "Mouse-drag the body (not bottom handle) by +64px vertically"
        - "Wait 800ms"
        - "Compare bounding box Y delta"
      expected: "Event moves >= 30px; PATCH /api/calendar/events/<id>/ fires"

    - id: TC-UI-28
      name: Calendar event resize grows height
      tab: /calendar
      priority: P1
      preconditions: "At least one event card with resize handle exists"
      actions:
