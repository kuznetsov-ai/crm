      tab: /clients (modal)
      priority: P1
      preconditions: "Open Create Client modal"
      actions:
        - "Fill ИНН input with '7736050003' (Gazprom)"
        - "Wait ~600ms for debounce"
        - "Observe live validation hint (✓ valid / ⚠ duplicate / ✗ invalid)"
      expected: "One of the three hints is visible within 2 seconds"

    # ── LeadEnrich modal / AI profile ─────────────────────────────────────
    - id: TC-UI-14
      name: LeadEnrich modal is wide enough on desktop
      tab: /clients
      priority: P1
      preconditions: "Desktop viewport 1440x900"
      actions:
        - "Open /clients"
        - "Click 'AI', 'Обогатить', or 'Enrich' trigger"
