# howTestMe.yaml — Studio CRM test description for TITAN
project:
  name: Studio CRM
  repo: github.com/kuznetsov-ai/crm
  local_path: /Users/kuznetsov/Projects/Personal projects/crm

  description: |
    Public demo of a full-stack CRM (Django 5 + React 19 + Postgres + Redis).
    Shared sandbox with daily auto-reset and BypassAuth — every visitor lands
    directly on /dashboard as `demo@studio.crm`.

  base_url: https://crm.ekuznetsov.dev

  routes:
    - /dashboard
    - /leads
    - /clients
    - /deals
    - /tasks
    - /chat
    - /calendar
    - /backlog
    - /kpi
    - /reports
    - /settings

  test_scenarios:
    - id: S01
      title: Dashboard renders
      description: Loads /dashboard and checks document title contains "Studio CRM".
    - id: S02
      title: Clients page renders
      description: Loads /clients and counts at least one anchor pointing to a client detail.
    - id: S03
      title: Deals page renders
      description: Loads /deals and counts deal nodes.
    - id: S04
      title: Tasks page renders
    - id: S05
      title: Backlog page renders
    - id: S06
      title: KPI page renders
    - id: S07
      title: Chat page renders
    - id: S08
      title: Calendar page renders
    - id: S10
      title: Mobile (393×852) — no horizontal overflow
      description: Loops through all main pages, fails if scrollWidth > innerWidth + 4.
    - id: S11
      title: Tablet (768×1024) — no horizontal overflow
    - id: S12
      title: Demo banner is shown on every page
      description: Looks for DEMO label and Reset button in body text.
    - id: S13
      title: POST /api/demo/reset returns ok=true
    - id: S14
      title: Mobile drawer — burger opens sidebar
    - id: S15
      title: Desktop sidebar collapse persists in localStorage
