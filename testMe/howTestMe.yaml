    # ── Calendar ──────────────────────────────────────────────────────────
    - id: TC-UI-26
      name: Calendar week view renders hour labels and events
      tab: /calendar
      priority: P0
      actions:
        - "Open /calendar"
        - "Count hour labels matching HH:00 (expect >= 5)"
        - "Count event cards with data-testid^='event-'"
      expected: "At least 5 hour labels and >= 1 event card render"

    - id: TC-UI-27
