      name: Workspace switcher shows multiple workspaces and allows switching
      tab: /dashboard (header)
      priority: P0
      viewport: desktop
      preconditions: "Admin user is member of two workspaces (idev + demo)"
      actions:
        - "Ensure Workspace(slug='demo') + Membership(admin@idev.team) via shell"
        - "Visit /dashboard"
        - "Click workspace switcher button in header"
        - "Verify dropdown shows both 'iDev' and 'Demo'"
